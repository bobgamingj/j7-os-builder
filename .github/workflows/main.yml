name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMB_EXPECT_NO_PROMPTS: "1"

    steps:
      ####################################################################
      # Install dependencies
      ####################################################################
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            zip \
            unzip \
            rsync \
            sudo

      ####################################################################
      # Create swap
      ####################################################################
      - name: Create swap memory
        run: |
          set -euxo pipefail

          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192

          sudo chmod 600 /mnt/swapfile

          sudo mkswap /mnt/swapfile

          sudo swapon /mnt/swapfile

          free -h

      ####################################################################
      # Clone pmbootstrap
      ####################################################################
      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      ####################################################################
      # Install pmbootstrap
      ####################################################################
      - name: Install pmbootstrap
        run: |
          set -euxo pipefail

          python3 -m venv ~/venv

          source ~/venv/bin/activate

          pip install --upgrade pip setuptools wheel

          pip install tomli pexpect

          pip install ./pmbootstrap

          echo "$HOME/venv/bin" >> $GITHUB_PATH

      ####################################################################
      # Initialize pmbootstrap
      ####################################################################
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          rm -rf ~/.config/pmbootstrap.cfg
          rm -rf ~/.local/var/pmbootstrap

          python3 <<'PY'
          import pexpect
          import sys

          child = pexpect.spawn(
              "pmbootstrap init",
              encoding="utf-8",
              timeout=1200
          )

          child.logfile = sys.stdout

          while True:
              i = child.expect([
                  r"Work path",
                  r"Choose a channel",
                  r"Vendor",
                  r"Device codename",
                  r"Kernel",
                  r"User interface",
                  r"Username",
                  r"Password",
                  r"Timezone",
                  r"Device hostname",
                  r"Continue",
                  r"Install",
                  r"WARNING",
                  r"\[y/N\]",
                  pexpect.EOF,
                  pexpect.TIMEOUT
              ])

              if i == 0:
                  child.sendline("")
              elif i == 1:
                  child.sendline("edge")
              elif i == 2:
                  child.sendline("samsung")
              elif i == 3:
                  child.sendline("j7elte")
              elif i == 4:
                  child.sendline("downstream")
              elif i == 5:
                  child.sendline("xfce4")
              elif i == 6:
                  child.sendline("postmarket")
              elif i == 7:
                  child.sendline("postmarket")
              elif i == 8:
                  child.sendline("UTC")
              elif i == 9:
                  child.sendline("pmos-j7")
              elif i in [10,11,12,13]:
                  child.sendline("y")
              elif i == 14:
                  break
              else:
                  print("TIMEOUT")
                  sys.exit(1)

          child.close()

          if child.exitstatus not in [0, None]:
              sys.exit(child.exitstatus)
          PY

      ####################################################################
      # Pull packages
      ####################################################################
      - name: Pull packages
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap pull

      ####################################################################
      # Build image
      ####################################################################
      - name: Build Android recovery zip
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap install \
            --android-recovery-zip \
            --no-fde

      ####################################################################
      # Export image
      ####################################################################
      - name: Export image
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          mkdir -p output

          pmbootstrap export

          cp -rv /tmp/postmarketOS-export/* output/ || true

          ls -lah output

      ####################################################################
      # Upload image
      ####################################################################
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/*
          if-no-files-found: error
