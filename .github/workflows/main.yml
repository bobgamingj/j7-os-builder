name: Build postmarketOS Samsung J7 XFCE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli openssl kpartx

      - name: Create Clean Swap Space
        run: |
          sudo swapoff -a || true
          # Using a unique path to avoid 'Text file busy'
          SWAPFILE=/mnt/pmos_final_swap
          sudo rm -f "$SWAPFILE"
          sudo fallocate -l 12G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=12288
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

      - name: Clone pmbootstrap
        run: git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports
        run: |
          # The official development branch for 2026 is 'main'
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Install pmbootstrap in VENV
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize and Configure pmbootstrap
        run: |
          source ~/venv/bin/activate
          rm -rf ~/.config/pmbootstrap.cfg
          
          # 1. Create the initial config file using --nd (non-interactive default)
          pmbootstrap init --nd
          
          # 2. Overwrite with your specific J7 requirements
          pmbootstrap config work "$PMOS_WORKDIR"
          pmbootstrap config aports "$PMOS_APORTS"
          pmbootstrap config channel edge
          pmbootstrap config device samsung-j7elte
          pmbootstrap config ui xfce4
          pmbootstrap config user "$PMOS_USER"
          pmbootstrap config hostname "$PMOS_HOSTNAME"
          pmbootstrap config systemd False
          pmbootstrap status

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # Adding zram-init for J7's 1.5GB RAM management
          pmbootstrap install \
            --add "zram-init,nodejs,npm,networkmanager,sudo" \
            --android-recovery-zip \
            --password "$PMOS_PASSWORD"

      - name: Export and Collect
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap export
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;
          ls -lah output

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4 # Valid GitHub Actions syntax
        with:
          name: postmarketOS-J7-Final
          path: output/
          if-no-files-found: error
