name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      # Keep pmbootstrap state and the Python venv in separate paths.
      PMOS_BASE: /tmp/pmos-ci
      PMOS_WORKDIR: /tmp/pmos-ci/work
      PMOS_APORTS: /tmp/pmos-ci/pmaports
      PMOS_CONFIG: /tmp/pmos-ci/pmbootstrap_v3.cfg
      VENV_DIR: /tmp/pmbootstrap-venv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix apt mirrors
        run: |
          set -euxo pipefail
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sudo apt-get clean
          echo 'Acquire::Retries "5";' | sudo tee /etc/apt/apt.conf.d/80-retries >/dev/null
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99-force-ipv4 >/dev/null

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update -o Acquire::ForceIPv4=true
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-tomli \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl

      - name: Create swap
        run: |
          set -euxo pipefail
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true
          sudo fallocate -l 8G /mnt/pmos.swap || sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192
          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap
          free -h

      - name: Clean old state
        run: |
          set -euxo pipefail
          rm -rf \
            /home/runner/.local/var/pmbootstrap \
            /home/runner/.config/pmbootstrap_v3.cfg \
            /home/runner/.cache/pmbootstrap \
            /home/runner/.local/state/pmbootstrap \
            "$PMOS_BASE"
          mkdir -p \
            "$PMOS_BASE" \
            "$PMOS_WORKDIR" \
            "$PMOS_APORTS" \
            "$(dirname "$PMOS_CONFIG")"

      - name: Setup Python environment
        run: |
          set -euxo pipefail
          python3 -m venv "$VENV_DIR"
          test -f "$VENV_DIR/bin/activate"
          source "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install tomli typing_extensions
          python -c "import tomli"

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          python -m pip install --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          pmbootstrap --version

      - name: Clone pmaports
        run: |
          set -euxo pipefail
          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      - name: Create pmbootstrap config
        run: |
          set -euxo pipefail
          cat > "$PMOS_CONFIG" <<EOF
          [pmbootstrap]
          work=$PMOS_WORKDIR
          aports=$PMOS_APORTS
          channel=edge
          device=samsung-j7elte
          kernel=downstream
          ui=xfce4
          user=pmos
          hostname=j7mini
          timezone=UTC
          locale=en_US.UTF-8
          systemd=always
          EOF
          cat "$PMOS_CONFIG"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          export PMBOOTSTRAP_NO_COLOR=1
          pmbootstrap -y --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            init \
            --shallow-initial-clone

      - name: Apply pmbootstrap config
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"

          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config work "$PMOS_WORKDIR"
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config aports "$PMOS_APORTS"
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config channel edge
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config device samsung-j7elte
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config kernel downstream
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config ui xfce4
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config user pmos
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config hostname j7mini
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config timezone UTC
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config locale en_US.UTF-8
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" config systemd always

      - name: Build recovery ZIP
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          export PMBOOTSTRAP_NO_COLOR=1
          pmbootstrap -y --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            install \
            --android-recovery-zip \
            --password 123456 \
            --no-sshd \
            --no-firewall

      - name: Export artifacts
        run: |
          set -euxo pipefail
          mkdir -p output
          find "$PMOS_WORKDIR" \
            -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true
          ls -lah output || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
