name: Build postmarketOS for Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMB_EXPECT_NO_PROMPTS: "1"

    steps:
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-setuptools \
            python3-wheel \
            python3-tomli \
            build-essential \
            zip \
            unzip \
            rsync \
            sudo

      - name: Create swap memory
        run: |
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

          free -h

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Install pmbootstrap
        run: |
          python3 -m venv ~/venv

          source ~/venv/bin/activate

          pip install --upgrade pip setuptools wheel

          pip install ./pmbootstrap

          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap
        run: |
          mkdir -p ~/pmos

          cat <<EOF > answers.txt
          ~/pmos
          edge
          samsung-j7elte
          xfce4
          EOF

          pmbootstrap init --details-to-stdout < answers.txt

      - name: Pull packages
        run: |
          pmbootstrap pull

      - name: Build image
        run: |
          pmbootstrap install \
            --android-recovery-zip \
            --no-fde

      - name: Export image
        run: |
          mkdir output

          pmbootstrap export

          cp -r /tmp/postmarketOS-export/* output/

          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/*
