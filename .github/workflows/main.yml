name: Build postmarketOS J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y python3-pip git sudo

      - name: Install pmbootstrap
        run: |
          pip install --user pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Clone pmaports
        run: |
          git clone https://github.com/postmarketOS/pmaports.git
          cd pmaports

      - name: Initialize pmbootstrap
        run: |
          mkdir -p ~/.config/pmbootstrap
          cat > ~/.config/pmbootstrap_v3.cfg <<EOF
          [pmbootstrap]
          device=samsung-j7elte
          userinterface=phosh
          EOF

      - name: Build
        run: |
          pmbootstrap --details-to-stdout init
          yes | pmbootstrap install --android-recovery-zip

      - name: Export
        run: |
          pmbootstrap export

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-j7elte
          path: /tmp/postmarketOS-export/
