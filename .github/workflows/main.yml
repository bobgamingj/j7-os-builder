name: Build postmarketOS Samsung J7 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli openssl kpartx

      - name: Create Clean Swap Space
        run: |
          # Disable existing swap to prevent "Text file busy" error
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Clone pmbootstrap and pmaports
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          # Using 'main' branch as 'edge' is now the default target
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Setup Python Environment
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap (Fixed 3.10.1 Sequence)
        run: |
          source ~/venv/bin/activate
          # This updated sequence includes 'pulseaudio' to satisfy the new 3.10.1 prompt
          pmbootstrap init <<EOF
          $PMOS_WORKDIR
          $PMOS_APORTS
          edge
          samsung
          j7elte
          y
          pulseaudio
          xfce4
          postmarket
          pmos-j7
          n
          EOF
          
          # Force OpenRC (no-systemd) because the J7's 3.10 kernel cannot run systemd
          pmbootstrap config systemd False
          pmbootstrap status

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # zram-init is mandatory for J7's 1.5GB RAM to prevent OOM crashes
          pmbootstrap install \
            --add "zram-init,nodejs,npm,networkmanager,sudo" \
            --android-recovery-zip \
            --no-systemd \
            --password "postmarket"

      - name: Export and Collect
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap export
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-samsung-j7-xfce
          path: output/
