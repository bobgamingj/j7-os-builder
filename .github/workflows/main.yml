name: Build postmarketOS Samsung J7 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli openssl kpartx

      - name: Fix Swap Space
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos_swap
          sudo fallocate -l 12G /mnt/pmos_swap
          sudo chmod 600 /mnt/pmos_swap
          sudo mkswap /mnt/pmos_swap
          sudo swapon /mnt/pmos_swap

      - name: Clone pmbootstrap
        run: git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports (Main Branch)
        run: |
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Setup Python Environment
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap (3.10.1 Format)
        run: |
          source ~/venv/bin/activate
          # This provides the exact sequence of answers for the 3.10.1 wizard
          # 1. Work path, 2. Aports path, 3. Channel (edge), 4. Vendor (samsung), 
          # 5. Device (j7elte), 6. UI (xfce4), 7. User, 8. Hostname, 9. Additional Options
          pmbootstrap init <<EOF
          $PMOS_WORKDIR
          $PMOS_APORTS
          edge
          samsung
          j7elte
          xfce4
          postmarket
          pmos-j7
          n
          EOF

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # Mandatory zram-init for J7's 1.5GB RAM
          # Force systemd=False via the install flag for the legacy 3.10 kernel
          pmbootstrap install \
            --add "zram-init,nodejs,npm,networkmanager,sudo" \
            --android-recovery-zip \
            --no-systemd \
            --password "postmarket"

      - name: Export and Collect
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap export
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-samsung-j7-xfce
          path: output/
