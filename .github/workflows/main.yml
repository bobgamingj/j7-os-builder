name: Build postmarketOS for Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMB_EXPECT_NO_PROMPTS: "1"

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            zip \
            unzip \
            rsync \
            sudo

      - name: Create swap memory
        run: |
          set -euxo pipefail
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          swapon --show
          free -h

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          rm -rf ~/.config/pmbootstrap.cfg
          mkdir -p ~/pmos

          printf '%s\n' \
            "$HOME/pmos" \
            "edge" \
            "samsung-j7elte" \
            "xfce4" \
            | pmbootstrap init --details-to-stdout

      - name: Pull packages
        run: |
          set -euxo pipefail
          pmbootstrap pull

      - name: Build image
        run: |
          set -euxo pipefail
          pmbootstrap install --android-recovery-zip --no-fde

      - name: Export image
        run: |
          set -euxo pipefail
          mkdir -p output
          pmbootstrap export
          cp -v /tmp/postmarketOS-export/* output/ || true
          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/*
          if-no-files-found: error
