name: Build postmarketOS J7 Final
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install pmbootstrap
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openssl git
          pip3 install pmbootstrap

      - name: Configure pmbootstrap
        run: |
          # We use "yes |" to force the build through any questions
          yes '' | pmbootstrap init --device samsung-j7elte --ui xfce4 --work /home/runner/workdir --channel edge
          
      - name: Build Android Recovery Zip
        run: |
          # This builds the OS and packages it for TWRP
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export File
        run: pmbootstrap export

      - name: Upload OS Zip
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: /tmp/postmarketOS-export/*.zip
