name: Build postmarketOS J7 Final
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Manually Create Config File
        run: |
          # This bypasses all questions and errors
          mkdir -p ~/.config
          cat <<EOF > ~/.config/pmbootstrap.cfg
          [pmbootstrap]
          aports = /home/runner/workdir/cache_git/pmaports
          ccache_size = 5G
          is_default_channel = False
          device = samsung-j7elte
          extra_packages = none
          hostname = j7-linux
          build_pkgs_on_install = True
          jobs = 4
          kernel = default
          locale = en_US.UTF-8
          mirror_alpine = http://dl-cdn.alpinelinux.org/alpine/
          mirrors_postmarketos = http://mirror.postmarketos.org/postmarketos/
          nonfree_firmware = True
          nonfree_userland = False
          ui = xfce4
          user = user
          work = /home/runner/workdir
          channel = edge
          EOF

      - name: Pull Ports and Prepare
        run: |
          # This downloads the actual J7 code from the internet
          pmbootstrap pull
          # We need to zap (clean) the environment once to prevent lock errors
          pmbootstrap zap -m

      - name: Build Android Recovery Zip
        run: |
          # This will take 15-20 minutes. It's building your whole OS!
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          cp /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
