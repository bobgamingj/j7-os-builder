name: Build postmarketOS J7 v4
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Forced Initialization
        run: |
          # 1. Clean up any old broken configs
          rm -rf ~/.config/pmbootstrap.cfg
          
          # 2. We provide the Workdir and Channel, then let 'yes' handle the other 20+ questions
          # This accepts all defaults for things like Timezone and Locale
          printf "/home/runner/workdir\nedge\n" | yes '' | pmbootstrap init
          
          # 3. Now we OVERRIDE the defaults with the specific Samsung J7 hardware settings
          pmbootstrap config device samsung-j7elte
          pmbootstrap config ui xfce4
          
          # 4. Download the actual Samsung code
          pmbootstrap pull

      - name: Build Android Recovery Zip
        run: |
          # The 'zap' ensures the environment is fresh before starting the big build
          pmbootstrap zap -m
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          # -L ensures we get the real file, not a shortcut
          cp -L /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
