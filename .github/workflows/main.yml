 - name: Initialize pmbootstrap
  shell: bash
  run: |
    set -euxo pipefail

    source /tmp/pmos-venv/bin/activate

    export PMBOOTSTRAP_NO_COLOR=1

    mkdir -p /tmp/pmos-ci/work
    mkdir -p /tmp/pmos-ci

    # Clone pmaports ONLY if missing
    if [ ! -d /tmp/pmos-ci/pmaports/.git ]; then
      git clone --depth=1 \
        https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
        /tmp/pmos-ci/pmaports
    fi

    # Remove old config
    rm -f /tmp/pmos-ci/pmbootstrap_v3.cfg

    # Fully automated init
    cat <<'EOF' | pmbootstrap \
      -y \
      --details-to-stdout \
      -c /tmp/pmos-ci/pmbootstrap_v3.cfg \
      -w /tmp/pmos-ci/work \
      -p /tmp/pmos-ci/pmaports \
      init

    edge
    samsung
    j7elte
    downstream
    pmos
    default
    default
    default
    xfce4
    default
    n
    1
    none
    y
    en_US
    j7mini
    y
    EOF

    # Verify config exists
    test -f /tmp/pmos-ci/pmbootstrap_v3.cfg

    echo "pmbootstrap init completed successfully"
