name: Build postmarketOS J7
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install pmbootstrap
        run: pip3 install pmbootstrap
      - name: Generate Config
        run: |
          mkdir -p ~/.config
          cat <<EOF > ~/.config/pmbootstrap.cfg
          [pmbootstrap]
          aports = /home/runner/.local/var/pmbootstrap/cache_git/pmaports
          ccache_size = 5G
          is_default_channel = False
          device = j7elte
          extra_packages = none
          hostname = linux
          build_pkgs_on_install = True
          jobs = 4
          kernel = default
          locale = en_US.UTF-8
          mirror_alpine = http://dl-cdn.alpinelinux.org/alpine/
          mirrors_postmarketos = http://mirror.postmarketos.org/postmarketos/
          nonfree_firmware = True
          nonfree_userland = False
          ui = xfce4
          user = user
          work = /home/runner/.local/var/pmbootstrap
          channel = edge
          EOF
          pmbootstrap pull
      - name: Build Zip
        run: pmbootstrap install --android-recovery-zip
      - name: Export File
        run: pmbootstrap export
      - name: Upload OS
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7-XFCE
          path: /tmp/postmarketOS-export/*.zip
