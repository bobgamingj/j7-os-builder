 name: Initialize pmbootstrap
  run: |
    set -euxo pipefail

    source /tmp/pmos-venv/bin/activate

    # CLEAN OLD FILES
    sudo rm -rf /tmp/pmos-ci/work
    sudo rm -rf /tmp/pmos-ci/pmaports
    sudo rm -f /tmp/pmos-ci/pmbootstrap_v3.cfg

    mkdir -p /tmp/pmos-ci

    # CLONE PMAPORTS
    git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git /tmp/pmos-ci/pmaports

    # CREATE CONFIG
    cat > /tmp/pmos-ci/pmbootstrap_v3.cfg <<EOF
    [pmbootstrap]
    work=/tmp/pmos-ci/work
    pmaports=/tmp/pmos-ci/pmaports
    sudo=sudo
    password=
    hostname=
    extra_space=0

    [device]
    vendor=samsung
    name=j7elte
    arch=armv7

    [ui]
    selected=phosh
    EOF

    # INITIALIZE
    pmbootstrap -y \
      --details-to-stdout \
      -c /tmp/pmos-ci/pmbootstrap_v3.cfg \
      -w /tmp/pmos-ci/work \
      -p /tmp/pmos-ci/pmaports \
      init
