name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      PMOS_WORKDIR: /tmp/pmos-work
      PMOS_APORTS: /tmp/pmaports
      PMOS_VENV: /tmp/pmos-venv

    steps:
      #
      # CHECKOUT
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # FIX APT
      #
      - name: Fix apt mirrors
        run: |
          set -euxo pipefail

          sudo sed -i \
            's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list || true

          sudo apt-get clean

      #
      # INSTALL DEPENDENCIES
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl \
            sudo

      #
      # SWAP
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo fallocate -l 8G /mnt/pmos.swap || \
          sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192

          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap

          free -h

      #
      # CLEAN EVERYTHING
      #
      - name: Clean state
        run: |
          set -euxo pipefail

          sudo rm -rf \
            "$PMOS_WORKDIR" \
            "$PMOS_APORTS" \
            "$PMOS_VENV" \
            ~/.local/var/pmbootstrap \
            ~/.cache/pmbootstrap \
            ~/.config/pmbootstrap* \
            ~/.local/state/pmbootstrap

          mkdir -p \
            "$PMOS_WORKDIR" \
            "$PMOS_APORTS"

      #
      # PYTHON VENV
      #
      - name: Setup Python
        run: |
          set -euxo pipefail

          python3 -m venv "$PMOS_VENV"

          source "$PMOS_VENV/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          python -m pip install \
            tomli \
            typing_extensions

      #
      # INSTALL PMBOOTSTRAP
      #
      - name: Install pmbootstrap
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          pmbootstrap --version

      #
      # CLONE PMAPORTS
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # PMBOOTSTRAP INIT
      #
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          export PMBOOTSTRAP_NO_COLOR=1

          #
          # AUTOMATIC ANSWERS
          #
          printf '%s\n' \
            "$PMOS_WORKDIR" \
            "y" \
            "edge" \
            "samsung-j7elte" \
            "downstream" \
            "xfce4" \
            "y" \
            "none" \
            "en_US.UTF-8" \
            "UTC" \
            "pmos" \
            | pmbootstrap init \
                --aports "$PMOS_APORTS"

      #
      # BUILD RECOVERY ZIP
      #
      - name: Build recovery ZIP
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          export PMBOOTSTRAP_NO_COLOR=1

          pmbootstrap install \
            --android-recovery-zip \
            --password 123456

      #
      # EXPORT FILES
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; || true

          ls -lah output || true

      #
      # UPLOAD
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
