name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMB_FORCE_NONINTERACTIVE: "1"

    steps:

      ####################################################################
      # Install dependencies
      ####################################################################
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support

      ####################################################################
      # Create swap
      ####################################################################
      - name: Create swap memory
        run: |
          set -euxo pipefail

          sudo fallocate -l 8G /swapfile || \
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192

          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          free -h

      ####################################################################
      # Clone pmbootstrap
      ####################################################################
      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      ####################################################################
      # Install pmbootstrap
      ####################################################################
      - name: Install pmbootstrap
        run: |
          set -euxo pipefail

          python3 -m venv ~/venv

          source ~/venv/bin/activate

          pip install --upgrade pip setuptools wheel

          pip install ./pmbootstrap

          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      ####################################################################
      # Initialize pmbootstrap
      ####################################################################
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          rm -rf ~/.config/pmbootstrap.cfg
          rm -rf ~/.local/var/pmbootstrap

          python3 <<'PY'
          import pexpect
          import sys

          child = pexpect.spawn(
              "pmbootstrap init",
              encoding="utf-8",
              timeout=1800
          )

          child.logfile = sys.stdout

          prompts = [
              r"Work path",
              r"pmaports path",
              r"Choose a channel",
              r"Vendor",
              r"Device codename",
              r"Kernel",
              r"User interface",
              r"Username",
              r"Password",
              r"Timezone",
              r"Device hostname",
              r"Enable.*SSH",
              r"User interface.*",
              r"extra free space",
              r"\[Y/n\]",
              r"\[y/N\]",
              pexpect.EOF,
              pexpect.TIMEOUT
          ]

          while True:
              i = child.expect(prompts)

              # Work path
              if i == 0:
                  child.sendline("")

              # pmaports path
              elif i == 1:
                  child.sendline("")

              # Channel
              elif i == 2:
                  child.sendline("edge")

              # Vendor
              elif i == 3:
                  child.sendline("samsung")

              # Device codename
              elif i == 4:
                  child.sendline("j7elte")

              # Kernel
              elif i == 5:
                  child.sendline("downstream")

              # UI
              elif i == 6:
                  child.sendline("xfce4")

              # Username
              elif i == 7:
                  child.sendline("postmarket")

              # Password
              elif i == 8:
                  child.sendline("postmarket")

              # Timezone
              elif i == 9:
                  child.sendline("UTC")

              # Hostname
              elif i == 10:
                  child.sendline("pmos-j7")

              # SSH
              elif i == 11:
                  child.sendline("none")

              # UI confirmation
              elif i == 12:
                  child.sendline("y")

              # Extra space
              elif i == 13:
                  child.sendline("0")

              # Yes prompts
              elif i in [14, 15]:
                  child.sendline("y")

              # EOF
              elif i == 16:
                  break

              # TIMEOUT
              else:
                  print("ERROR: pmbootstrap init timed out")
                  sys.exit(1)

          child.close()

          if child.exitstatus not in [0, None]:
              sys.exit(child.exitstatus)
          PY

      ####################################################################
      # Pull packages
      ####################################################################
      - name: Pull packages
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap pull

      ####################################################################
      # Build image
      ####################################################################
      - name: Build Android recovery zip
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          yes "" | pmbootstrap install \
            --android-recovery-zip \
            --no-fde

      ####################################################################
      # Export image
      ####################################################################
      - name: Export image
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          mkdir -p output

          pmbootstrap export || true

          find ~/.local/var/pmbootstrap/chroot_native/home/pmos/root \
            -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      ####################################################################
      # Upload artifacts
      ####################################################################
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/
          if-no-files-found: error
