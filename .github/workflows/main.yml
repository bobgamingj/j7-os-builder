name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      # SAFE CUSTOM PATHS
      PMOS_ROOT: /tmp/pmos
      PMOS_WORKDIR: /tmp/pmos/work
      PMOS_APORTS: /tmp/pmaports
      PMOS_CONFIG: /tmp/pmbootstrap_v3.cfg
      VENV_DIR: /tmp/venv

    steps:
      #
      # Checkout
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Fix Ubuntu mirrors
      #
      - name: Fix apt mirrors
        run: |
          set -euxo pipefail

          sudo sed -i \
            's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list || true

          sudo apt-get clean

          echo 'Acquire::Retries "5";' \
            | sudo tee /etc/apt/apt.conf.d/80-retries >/dev/null

          echo 'Acquire::ForceIPv4 "true";' \
            | sudo tee /etc/apt/apt.conf.d/99-force-ipv4 >/dev/null

      #
      # Install dependencies
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update -o Acquire::ForceIPv4=true

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-tomli \
            build-essential \
            ca-certificates \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl \
            sudo

      #
      # Create swap
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo fallocate -l 8G /mnt/pmos.swap || \
          sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192

          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap

          free -h

      #
      # Setup Python + pmbootstrap
      #
      - name: Setup pmbootstrap
        run: |
          set -euxo pipefail

          python3 -m venv "$VENV_DIR"

          source "$VENV_DIR/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          python -m pip install \
            tomli \
            typing_extensions

          python -c "import tomli"

          python -m pip install --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          pmbootstrap --version

      #
      # FULL CLEANUP
      #
      - name: Cleanup old state
        run: |
          set -euxo pipefail

          source "$VENV_DIR/bin/activate"

          pmbootstrap shutdown || true

          sudo rm -rf \
            /home/runner/.local/var/pmbootstrap \
            /home/runner/.config/pmbootstrap_v3.cfg \
            "$PMOS_ROOT" \
            "$PMOS_APORTS" \
            "$PMOS_CONFIG"

          mkdir -p \
            "$PMOS_ROOT" \
            "$PMOS_WORKDIR" \
            "$PMOS_APORTS"

      #
      # Clone pmaports
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # Create pmbootstrap config
      #
      - name: Create config
        run: |
          set -euxo pipefail

          cat > "$PMOS_CONFIG" <<EOF
          [pmbootstrap]
          work=$PMOS_WORKDIR
          aports=$PMOS_APORTS
          channel=edge
          device=samsung-j7elte
          ui=xfce4
          user=pmos
          hostname=j7mini
          timezone=UTC
          locale=en_US.UTF-8
          EOF

          echo "===== CONFIG ====="
          cat "$PMOS_CONFIG"

      #
      # Verify device exists
      #
      - name: Verify device
        run: |
          set -euxo pipefail

          find "$PMOS_APORTS/device" \
            -maxdepth 2 \
            -type d \
            | grep samsung || true

      #
      # Initialize pmbootstrap
      #
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source "$VENV_DIR/bin/activate"

          yes "" | pmbootstrap \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            init

      #
      # Build recovery ZIP
      #
      - name: Build recovery ZIP
        run: |
          set -euxo pipefail

          source "$VENV_DIR/bin/activate"

          pmbootstrap \
            --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            install \
            --android-recovery-zip \
            --password 123456

      #
      # Export artifacts
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; || true

          echo "===== OUTPUT ====="
          ls -lah output

      #
      # Upload artifacts
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
