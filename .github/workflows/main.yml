name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      # Keep pmbootstrap state out of the default runner home paths.
      PMOS_ROOT: ${{ runner.temp }}/pmos
      PMOS_WORKDIR: ${{ runner.temp }}/pmos/work
      PMOS_APORTS: ${{ runner.temp }}/pmaports
      PMOS_CONFIG: ${{ runner.temp }}/pmbootstrap_v3.cfg
      VENV_DIR: ${{ runner.temp }}/venv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix apt mirrors
        run: |
          set -euxo pipefail
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sudo apt-get clean
          echo 'Acquire::Retries "5";' | sudo tee /etc/apt/apt.conf.d/80-retries >/dev/null
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99-force-ipv4 >/dev/null

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update -o Acquire::ForceIPv4=true
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-tomli \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl

      - name: Create swap
        run: |
          set -euxo pipefail
          sudo fallocate -l 8G /mnt/pmos.swap || sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192
          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap
          free -h

      - name: Setup Python and pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          pmbootstrap --version

      - name: Clean old pmbootstrap state
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          pmbootstrap shutdown || true
          sudo rm -rf \
            "$PMOS_ROOT" \
            "$PMOS_APORTS" \
            "$PMOS_CONFIG" \
            ~/.local/var/pmbootstrap \
            ~/.config/pmbootstrap_v3.cfg
          mkdir -p "$PMOS_ROOT" "$PMOS_WORKDIR" "$(dirname "$PMOS_CONFIG")"

      - name: Clone pmaports
        run: |
          set -euxo pipefail
          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      - name: Create pmbootstrap config
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          cfg = textwrap.dedent(f"""\
          [pmbootstrap]
          work={os.environ["PMOS_WORKDIR"]}
          aports={os.environ["PMOS_APORTS"]}
          channel=edge
          device=samsung-j7elte
          ui=xfce4
          user=pmos
          hostname=j7mini
          timezone=UTC
          locale=en_US.UTF-8
          """)
          Path(os.environ["PMOS_CONFIG"]).write_text(cfg)
          PY

      - name: Validate config and device
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          pmbootstrap -c "$PMOS_CONFIG" -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" status
          find "$PMOS_APORTS/device" -maxdepth 2 -type d | grep samsung-j7 || true

      - name: Build recovery ZIP
        run: |
          set -euxo pipefail
          source "$VENV_DIR/bin/activate"
          pmbootstrap --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            install \
            --android-recovery-zip \
            --password 123456

      - name: Export artifacts
        run: |
          set -euxo pipefail
          mkdir -p output
          find "$PMOS_WORKDIR" \
            -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true
          ls -lah output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
