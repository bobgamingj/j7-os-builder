name: Build postmarketOS Samsung J7 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support \
            python3-tomli \
            openssl \
            kpartx

      - name: Create swap
        run: |
          set -euxo pipefail

          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Clone repositories
        run: |
          set -euxo pipefail

          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      - name: Setup Python
        run: |
          set -euxo pipefail

          python3 -m venv ~/venv

          source ~/venv/bin/activate

          pip install --upgrade pip setuptools wheel

          pip install ./pmbootstrap

      - name: Create pmbootstrap config manually
        run: |
          set -euxo pipefail

          mkdir -p ~/.config/pmbootstrap

          cat > ~/.config/pmbootstrap_v3.cfg <<EOF
          [pmbootstrap]
          work=/home/runner/.local/var/pmbootstrap
         

          [providers]
          mirrors=none

          [device]
          vendor=samsung
          codename=j7elte
          kernel=downstream

          [ui]
          name=xfce4

          [user]
          username=pmos
          hostname=j7pmos
          timezone=UTC
          locale=en_US.UTF-8

          [build]
          ccache=true
          jobs=4

          [paths]
          aports=/home/runner/pmaports
          EOF

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap \
            -c ~/.config/pmbootstrap_v3.cfg \
            init

      - name: Verify config
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap \
            -c ~/.config/pmbootstrap_v3.cfg \
            status

      - name: Build postmarketOS recovery zip
        run: |
          set -euxo pipefail

          source ~/venv/bin/activate

          pmbootstrap \
            -c ~/.config/pmbootstrap_v3.cfg \
            install \
            --android-recovery-zip

      - name: Export files
        run: |
          set -euxo pipefail

          mkdir -p output

          find /tmp/postmarketOS-export \
            -type f \
            \( -name "*.zip" -o -name "*.img" \) \
            -exec cp -v {} output/ \; || true

          find "$PMOS_WORKDIR" \
            -type f \
            \( -name "*.zip" -o -name "*.img" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7elte
          path: output/
