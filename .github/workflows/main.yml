name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/.local/var/pmbootstrap/cache_git/pmaports
      PMOS_CONFIG: /home/runner/.config/pmbootstrap_v3.cfg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl

      - name: Create swap
        run: |
          set -euxo pipefail
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true
          sudo fallocate -l 8G /mnt/pmos.swap
          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap
          free -h

      - name: Setup Python
        run: |
          set -euxo pipefail
          python3 -m venv /home/runner/venv
          source /home/runner/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install tomli
          python -c "import tomli; print('tomli OK')"
          python -m pip install --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          pmbootstrap --version

      - name: Prepare pmaports
        run: |
          set -euxo pipefail
          mkdir -p "$PMOS_WORKDIR/cache_git"
          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"
          test -d "$PMOS_APORTS"

      - name: Preseed pmbootstrap config
        run: |
          set -euxo pipefail
          mkdir -p ~/.config

          source /home/runner/venv/bin/activate

          pmbootstrap -c "$PMOS_CONFIG" config work "$PMOS_WORKDIR"
          pmbootstrap -c "$PMOS_CONFIG" config aports "$PMOS_APORTS"
          pmbootstrap -c "$PMOS_CONFIG" config device samsung-j7elte
          pmbootstrap -c "$PMOS_CONFIG" config kernel downstream
          pmbootstrap -c "$PMOS_CONFIG" config ui xfce4
          pmbootstrap -c "$PMOS_CONFIG" config user pmos
          pmbootstrap -c "$PMOS_CONFIG" config hostname j7mini
          pmbootstrap -c "$PMOS_CONFIG" config timezone UTC
          pmbootstrap -c "$PMOS_CONFIG" config locale en_US.UTF-8
          pmbootstrap -c "$PMOS_CONFIG" config jobs 4
          pmbootstrap -c "$PMOS_CONFIG" config ccache_size 5G

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate
          mkdir -p "$PMOS_WORKDIR"
          pmbootstrap -c "$PMOS_CONFIG" -y init --shallow-initial-clone

      - name: Show status
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate
          pmbootstrap -c "$PMOS_CONFIG" status

      - name: Build recovery zip
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate
          pmbootstrap -c "$PMOS_CONFIG" install \
            --android-recovery-zip \
            --password 123456

      - name: Export artifacts
        run: |
          set -euxo pipefail
          mkdir -p output
          find "$PMOS_WORKDIR" \
            -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true
          ls -lah output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
