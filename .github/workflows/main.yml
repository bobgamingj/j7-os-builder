name: Build postmarketOS Samsung J7 XFCE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli  # FIX: System-level requirement for pmbootstrap

      - name: Create Clean Swap Space
        run: |
          # Use a fresh mount point to avoid 'Text file busy' locks
          sudo swapoff -a || true
          SWAPFILE=/mnt/pmos_build_swap
          sudo rm -f "$SWAPFILE"
          sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

      - name: Clone pmbootstrap
        run: git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports
        run: |
          # FIX: The branch is 'main' for the current rolling release
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Install pmbootstrap in VENV
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli  # FIX: Ensures 'tomli' is present in the isolated environment
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          source ~/venv/bin/activate
          # Force clean config to avoid interactive "overwrite?" prompts
          rm -rf ~/.config/pmbootstrap.cfg
          
          # Automated initialization for j7elte (SM-J700F)
          pmbootstrap -y -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" init <<EOF
          edge
          samsung
          j7elte
          y
          xfce4
          $PMOS_USER
          $PMOS_HOSTNAME
          y
          n
          n
          EOF

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # Adding zram-init for RAM management and nodejs for your n8n mini-pc
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install \
            --add "zram-init,nodejs,npm,sudo,networkmanager" \
            --android-recovery-zip \
            --password "$PMOS_PASSWORD"

      - name: Export and Collect
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" export
          # Copy zip from temp export location
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;
          ls -lah output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-xfce-mini-pc
          path: output/
          if-no-files-found: error
