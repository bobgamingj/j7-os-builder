name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support

      - name: Create swap memory
        run: |
          set -euxo pipefail

          SWAPFILE=/mnt/pmos-swapfile

          sudo swapoff -a || true
          sudo rm -f "$SWAPFILE"

          sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          free -h
          swapon --show

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pexpect tomli
          python -m pip install ./pmbootstrap
          python - <<'PY'
          import pexpect, tomli
          print("Python dependencies OK")
          PY
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          rm -rf ~/.config/pmbootstrap.cfg
          rm -rf ~/.local/var/pmbootstrap

          python3 <<'PY'
          import pexpect
          import sys

          child = pexpect.spawn(
              "pmbootstrap init",
              encoding="utf-8",
              timeout=1800
          )
          child.logfile = sys.stdout

          while True:
              i = child.expect([
                  r"Work path",
                  r"pmaports path",
                  r"Choose a channel",
                  r"Vendor",
                  r"Device codename",
                  r"Kernel",
                  r"User interface",
                  r"Username",
                  r"Password",
                  r"Timezone",
                  r"Device hostname",
                  r"Enable.*SSH",
                  r"extra free space",
                  r"\[Y/n\]",
                  r"\[y/N\]",
                  pexpect.EOF,
                  pexpect.TIMEOUT
              ])

              if i in [0, 1]:
                  child.sendline("")
              elif i == 2:
                  child.sendline("edge")
              elif i == 3:
                  child.sendline("samsung")
              elif i == 4:
                  child.sendline("j7elte")
              elif i == 5:
                  child.sendline("downstream")
              elif i == 6:
                  child.sendline("xfce4")
              elif i == 7:
                  child.sendline("postmarket")
              elif i == 8:
                  child.sendline("postmarket")
              elif i == 9:
                  child.sendline("UTC")
              elif i == 10:
                  child.sendline("pmos-j7")
              elif i == 11:
                  child.sendline("none")
              elif i == 12:
                  child.sendline("0")
              elif i in [13, 14]:
                  child.sendline("y")
              elif i == 15:
                  break
              else:
                  print("ERROR: pmbootstrap init timed out")
                  sys.exit(1)

          child.close()

          if child.exitstatus not in [0, None]:
              sys.exit(child.exitstatus)
          PY

      - name: Pull packages
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap pull

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          yes "" | pmbootstrap install --android-recovery-zip --no-fde

      - name: Export image
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          mkdir -p output

          pmbootstrap export || true

          find ~/.local/var/pmbootstrap -type f \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/
          if-no-files-found: error
