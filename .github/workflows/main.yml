name: Build postmarketOS J7 v4
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Smart Initialization
        run: |
          # This provides the answers to the prompts in order:
          # 1. Work path
          # 2. Channel (edge)
          # 3. Vendor (samsung)
          # 4. Device (j7elte)
          # 5. Confirm testing (y)
          # 6. UI (xfce4)
          # 7. Rest are default Enters
          printf "/home/runner/workdir\nedge\nsamsung\nj7elte\ny\nxfce4\n\n\n\n\n\n\n\n\n\n\n\n" | pmbootstrap init

      - name: Pull and Prepare
        run: |
          pmbootstrap pull
          # We force the UI and Device again just in case init skipped them
          pmbootstrap config device samsung-j7elte
          pmbootstrap config ui xfce4

      - name: Build Android Recovery Zip
        run: |
          # This is the long part (15-20 mins)
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          cp -L /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
