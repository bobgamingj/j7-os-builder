```yaml id="z8q5lm"
name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_CONFIG: /home/runner/.config/pmbootstrap_v3.cfg

    steps:
      #
      # Checkout
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Install system dependencies
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl \
            android-sdk-libsparse-utils

      #
      # Add swap
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true

          sudo fallocate -l 8G /mnt/pmos.swap

          sudo chmod 600 /mnt/pmos.swap

          sudo mkswap /mnt/pmos.swap

          sudo swapon /mnt/pmos.swap

          free -h

      #
      # Clone pmaports
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # Setup Python
      #
      - name: Setup Python virtualenv
        run: |
          set -euxo pipefail

          python3 -m venv /home/runner/venv

          source /home/runner/venv/bin/activate

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          #
          # REQUIRED FOR PYTHON 3.10
          #
          python -m pip install \
            tomli \
            typing_extensions

          #
          # VERIFY tomli EXISTS
          #
          python -c "import tomli; print('tomli OK')"

          #
          # INSTALL PMBOOTSTRAP
          #
          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          #
          # VERIFY PMBOOTSTRAP
          #
          pmbootstrap --version

      #
      # Create config
      #
      - name: Create pmbootstrap config
        run: |
          set -euxo pipefail

          mkdir -p ~/.config

          cat > "$PMOS_CONFIG" <<EOF
          [pmbootstrap]
          work=$PMOS_WORKDIR

          [providers]
          mirrors=none

          [device]
          vendor=samsung
          codename=j7elte
          kernel=downstream

          [ui]
          name=xfce4

          [user]
          username=pmos
          password=123456
          hostname=j7mini

          [build]
          ccache=true
          jobs=4

          [paths]
          aports=$PMOS_APORTS
          EOF

          cat "$PMOS_CONFIG"

      #
      # Initialize pmbootstrap
      #
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source /home/runner/venv/bin/activate

          mkdir -p "$PMOS_WORKDIR"

          #
          # VERIFY AGAIN BEFORE INIT
          #
          python -c "import tomli"

          pmbootstrap \
            --config="$PMOS_CONFIG" \
            --details-to-stdout \
            init

      #
      # Show status
      #
      - name: pmbootstrap status
        run: |
          set -euxo pipefail

          source /home/runner/venv/bin/activate

          pmbootstrap \
            --config="$PMOS_CONFIG" \
            status

      #
      # Build image
      #
      - name: Build recovery zip
        run: |
          set -euxo pipefail

          source /home/runner/venv/bin/activate

          pmbootstrap \
            --config="$PMOS_CONFIG" \
            install \
            --android-recovery-zip \
            --password 123456 \
            --disk 8G

      #
      # Export files
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      #
      # Upload artifacts
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
```
