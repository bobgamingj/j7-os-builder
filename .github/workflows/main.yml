name: Build postmarketOS J7 v3
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap (v3 Style)
        run: |
          # 1. Remove any broken old config
          rm -rf ~/.config/pmbootstrap.cfg
          
          # 2. Feed the answers to 'init' in the exact order it asks:
          # Answer 1: Work path (/home/runner/workdir)
          # Answer 2: Channel (edge)
          # Answer 3: Device (samsung-j7elte)
          # Answer 4: Confirm testing repo (y)
          # Answer 5: UI (xfce4)
          # Answer 6+: Just Enters for the rest
          printf "/home/runner/workdir\nedge\nsamsung-j7elte\ny\nxfce4\n\n\n\n\n\n\n\n\n" | pmbootstrap init

      - name: Build Android Recovery Zip
        run: |
          # Use --assume-yes to skip the "Do you want to continue?" prompt
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          # Copying the real file (not the symlink) to output
          cp -L /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
