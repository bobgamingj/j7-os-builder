name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/.local/var/pmbootstrap/cache_git/pmaports

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl \
            expect

      - name: Create swap
        run: |
          set -euxo pipefail
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true
          sudo fallocate -l 8G /mnt/pmos.swap
          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap
          free -h

      - name: Setup Python
        run: |
          set -euxo pipefail
          python3 -m venv /home/runner/venv
          source /home/runner/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install tomli
          python -c "import tomli; print('tomli OK')"
          python -m pip install --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          pmbootstrap --version

      - name: Prepare pmaports
        run: |
          set -euxo pipefail
          mkdir -p "$PMOS_WORKDIR/cache_git"
          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"
          test -d "$PMOS_APORTS"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate

          cat > /tmp/pmbootstrap_init.expect <<'EOF'
          set timeout 120
          log_user 1

          spawn pmbootstrap -w $env(PMOS_WORKDIR) -p $env(PMOS_APORTS) init

          expect {
            -re {(?i)work path.*:} {
              send -- "$env(PMOS_WORKDIR)\r"
              exp_continue
            }
            -re {(?i)pmaports.*path.*:} {
              send -- "$env(PMOS_APORTS)\r"
              exp_continue
            }
            -re {(?i)channel.*:} {
              send -- "edge\r"
              exp_continue
            }
            -re {(?i)device vendor.*:} {
              send -- "samsung\r"
              exp_continue
            }
            -re {(?i)(codename|model).*:} {
              send -- "j7elte\r"
              exp_continue
            }
            -re {(?i)kernel.*:} {
              send -- "downstream\r"
              exp_continue
            }
            -re {(?i)ui.*:} {
              send -- "xfce4\r"
              exp_continue
            }
            -re {(?i)(username|user).*:} {
              send -- "pmos\r"
              exp_continue
            }
            -re {(?i)hostname.*:} {
              send -- "j7mini\r"
              exp_continue
            }
            -re {(?i)timezone.*:} {
              send -- "UTC\r"
              exp_continue
            }
            -re {(?i)locale.*:} {
              send -- "en_US.UTF-8\r"
              exp_continue
            }
            -re {(?i)password.*:} {
              send -- "123456\r"
              exp_continue
            }
            -re {(?i)systemd.*:} {
              send -- "yes\r"
              exp_continue
            }
            -re {(?i)ssh.*keys.*:} {
              send -- "\r"
              exp_continue
            }
            -re {(?i)mirror.*:} {
              send -- "\r"
              exp_continue
            }
            eof
          }
          EOF

          expect -f /tmp/pmbootstrap_init.expect

      - name: Show status
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" status

      - name: Build recovery ZIP
        run: |
          set -euxo pipefail
          source /home/runner/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" install \
            --android-recovery-zip \
            --password 123456

      - name: Export artifacts
        run: |
          set -euxo pipefail
          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
