name: Build postmarketOS Samsung J7 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip python3-venv \
            build-essential ca-certificates zip unzip rsync sudo \
            qemu-user-static binfmt-support python3-tomli openssl kpartx \
            expect

      - name: Create swap space
        run: |
          set -euxo pipefail
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos_swap
          sudo fallocate -l 12G /mnt/pmos_swap
          sudo chmod 600 /mnt/pmos_swap
          sudo mkswap /mnt/pmos_swap
          sudo swapon /mnt/pmos_swap

      - name: Clone pmbootstrap and pmaports
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Setup Python environment
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          cat > /tmp/pmbootstrap-init.exp <<'EOF'
          #!/usr/bin/expect -f
          set timeout -1

          set workdir $env(PMOS_WORKDIR)
          set aportspath $env(PMOS_APORTS)

          spawn pmbootstrap -w $workdir -p $aportspath init --shallow-initial-clone

          expect {
            -re {Choose the postmarketOS release channel.*} {
              send -- "edge\r"
              exp_continue
            }
            -re {Choose your target device vendor.*} {
              send -- "samsung\r"
              exp_continue
            }
            -re {Device codename.*} {
              send -- "j7elte\r"
              exp_continue
            }
            -re {Type\? \(mainline/downstream\):} {
              send -- "downstream\r"
              exp_continue
            }
            -re {Choose your username.*} {
              send -- "pmos\r"
              exp_continue
            }
            -re {User interface.*} {
              send -- "xfce4\r"
              exp_continue
            }
            -re {Locale.*} {
              send -- "en_US.UTF-8\r"
              exp_continue
            }
            -re {Timezone.*} {
              send -- "UTC\r"
              exp_continue
            }
            -re {SSH keys.*} {
              send -- "n\r"
              exp_continue
            }
            -re {.*: $} {
              send -- "\r"
              exp_continue
            }
            eof
          }
          EOF

          chmod +x /tmp/pmbootstrap-init.exp
          /tmp/pmbootstrap-init.exp

      - name: Show config status
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" status

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install --android-recovery-zip

      - name: Export artifacts
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" export
          mkdir -p output
          find /tmp/postmarketOS-export -type f \( -name "*.zip" -o -name "*.img" \) -exec cp -v {} output/ \; || true
          find "$HOME/.local/var/pmbootstrap" -type f \( -name "*.zip" -o -name "*.img" \) -exec cp -v {} output/ \; || true
          ls -lah output

      - name: Upload finished image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-samsung-j7elte
          path: output/
