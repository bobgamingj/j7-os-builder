name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      PMOS_ROOT: /tmp/pmos-ci
      PMOS_WORKDIR: /tmp/pmos-ci/work
      PMOS_APORTS: /tmp/pmos-ci/pmaports
      PMOS_CONFIG: /tmp/pmos-ci/pmbootstrap_v3.cfg
      PMOS_VENV: /tmp/pmos-venv

    steps:
      #
      # CHECKOUT
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # FIX UBUNTU MIRRORS
      #
      - name: Fix apt mirrors
        run: |
          set -euxo pipefail

          sudo sed -i \
            's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list || true

          echo 'Acquire::Retries "5";' \
            | sudo tee /etc/apt/apt.conf.d/80-retries

          echo 'Acquire::ForceIPv4 "true";' \
            | sudo tee /etc/apt/apt.conf.d/99-force-ipv4

          sudo apt-get clean

      #
      # INSTALL PACKAGES
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update -o Acquire::ForceIPv4=true

          sudo apt-get install -y \
            git \
            curl \
            sudo \
            zip \
            unzip \
            rsync \
            xz-utils \
            build-essential \
            ca-certificates \
            python3 \
            python3-pip \
            python3-venv \
            qemu-user-static \
            binfmt-support \
            e2fsprogs \
            dosfstools \
            kpartx \
            ccache \
            openssl

      #
      # CREATE SWAP
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true

          sudo fallocate -l 8G /mnt/pmos.swap \
            || sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192

          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap

          free -h

      #
      # CLEAN OLD STATE
      #
      - name: Clean old state
        run: |
          set -euxo pipefail

          sudo rm -rf \
            "$PMOS_ROOT" \
            "$PMOS_VENV" \
            ~/.local/var/pmbootstrap \
            ~/.cache/pmbootstrap \
            ~/.config/pmbootstrap* \
            ~/.local/state/pmbootstrap

          mkdir -p \
            "$PMOS_ROOT" \
            "$PMOS_WORKDIR"

      #
      # SETUP PYTHON
      #
      - name: Setup Python venv
        run: |
          set -euxo pipefail

          python3 -m venv "$PMOS_VENV"

          source "$PMOS_VENV/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          #
          # REQUIRED FOR PYTHON 3.10
          #
          python -m pip install \
            tomli \
            typing_extensions

          python -c "import tomli"

      #
      # INSTALL PMBOOTSTRAP
      #
      - name: Install pmbootstrap
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          python -c "import tomli"

          pmbootstrap --version

      #
      # CLONE PMAPORTS
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # INITIALIZE PMBOOTSTRAP
      #
      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          export PMBOOTSTRAP_NO_COLOR=1

          #
          # IMPORTANT:
          # DO NOT PIPE ANSWERS
          # JUST ACCEPT DEFAULTS
          #
          yes "" | pmbootstrap \
            -y \
            --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            init \
            --shallow-initial-clone

      #
      # CONFIGURE DEVICE
      #
      - name: Configure pmbootstrap
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          pmbootstrap -c "$PMOS_CONFIG" config device samsung-j7elte
          pmbootstrap -c "$PMOS_CONFIG" config kernel downstream
          pmbootstrap -c "$PMOS_CONFIG" config ui xfce4
          pmbootstrap -c "$PMOS_CONFIG" config user pmos
          pmbootstrap -c "$PMOS_CONFIG" config hostname j7mini
          pmbootstrap -c "$PMOS_CONFIG" config locale en_US.UTF-8
          pmbootstrap -c "$PMOS_CONFIG" config timezone UTC
          pmbootstrap -c "$PMOS_CONFIG" config systemd always

      #
      # SHOW CONFIG
      #
      - name: Verify config
        run: |
          set -euxo pipefail

          cat "$PMOS_CONFIG"

          source "$PMOS_VENV/bin/activate"

          pmbootstrap -c "$PMOS_CONFIG" status

      #
      # BUILD RECOVERY ZIP
      #
      - name: Build recovery ZIP
        run: |
          set -euxo pipefail

          source "$PMOS_VENV/bin/activate"

          export PMBOOTSTRAP_NO_COLOR=1

          yes "" | pmbootstrap \
            -y \
            --details-to-stdout \
            -c "$PMOS_CONFIG" \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            install \
            --android-recovery-zip \
            --password 123456

      #
      # EXPORT FILES
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; \
            || true

          ls -lah output || true

      #
      # UPLOAD
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-build
          path: output/
