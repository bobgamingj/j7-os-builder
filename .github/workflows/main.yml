name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    env:
      PMOS_PATH: /tmp/pmos-ci
      PMOS_WORK: /tmp/pmos-ci/work
      PMOS_PMAPORTS: /tmp/pmos-ci/pmaports
      PMOS_CFG: /tmp/pmos-ci/pmbootstrap_v3.cfg
      VENV_PATH: /tmp/pmos-venv
      PMBOOTSTRAP_NO_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            qemu-user-static \
            binfmt-support \
            zip \
            unzip \
            rsync \
            kpartx \
            e2fsprogs \
            android-sdk-libsparse-utils \
            dosfstools \
            fakeroot \
            ccache \
            sudo \
            ca-certificates \
            curl

      - name: Create Python virtual environment
        shell: bash
        run: |
          set -euxo pipefail

          python3 -m venv "$VENV_PATH"

          source "$VENV_PATH/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel \
            tomli

      - name: Install pmbootstrap
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          which pmbootstrap
          pmbootstrap --version

      - name: Prepare directories
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$PMOS_PATH"
          mkdir -p "$PMOS_WORK"
          mkdir -p "$PMOS_PMAPORTS"

      - name: Clone pmaports
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf "$PMOS_PMAPORTS"

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_PMAPORTS"

          test -f "$PMOS_PMAPORTS/pmaports.cfg"

          echo "pmaports.cfg found successfully"

      - name: Initialize pmbootstrap configuration
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          rm -f "$PMOS_CFG"

          pmbootstrap \
            --details-to-stdout \
            --non-interactive \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            init

      - name: Configure device
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          pmbootstrap \
            --details-to-stdout \
            --non-interactive \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            config device samsung-j7elte

          pmbootstrap \
            --details-to-stdout \
            --non-interactive \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            config ui xfce4

      - name: Show pmbootstrap configuration
        shell: bash
        run: |
          set -euxo pipefail

          cat "$PMOS_CFG"

      - name: Build recovery zip
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          pmbootstrap \
            --details-to-stdout \
            --non-interactive \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            install \
            --android-recovery-zip \
            --password 123456

      - name: Export generated files
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          pmbootstrap \
            --details-to-stdout \
            --non-interactive \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            export

          ls -lah /tmp/postmarketOS-export || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-j7elte
          path: /tmp/postmarketOS-export/
          if-no-files-found: error
