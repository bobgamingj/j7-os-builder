name: Build postmarketOS Samsung J7 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli openssl kpartx

      - name: Create Clean Swap Space
        run: |
          # Use a unique name to avoid "Text file busy" errors
          sudo swapoff -a || true
          sudo rm -f /mnt/pmos_swap_file
          sudo fallocate -l 12G /mnt/pmos_swap_file
          sudo chmod 600 /mnt/pmos_swap_file
          sudo mkswap /mnt/pmos_swap_file
          sudo swapon /mnt/pmos_swap_file

      - name: Clone pmbootstrap and pmaports
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          # 'main' is the required branch for 2026 builds
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Setup Python Environment
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap (Full 3.10.1 Prompt Sequence)
        run: |
          source ~/venv/bin/activate
          # This sequence answers: Workdir, Aports, Channel, Vendor, Device, Downstream(y), 
          # User, Audio Provider, UI, Hostname, Additional Features(n)
          pmbootstrap init <<EOF
          $PMOS_WORKDIR
          $PMOS_APORTS
          edge
          samsung
          j7elte
          y
          postmarket
          pulseaudio
          xfce4
          pmos-j7
          n
          EOF
          
          # Force OpenRC because the J7 kernel (3.10) is too old for systemd
          pmbootstrap config systemd False
          pmbootstrap status

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # zram-init prevents 'Out of Memory' on the J7's 1.5GB RAM
          pmbootstrap install \
            --add "zram-init,nodejs,npm,networkmanager,sudo" \
            --android-recovery-zip \
            --no-systemd \
            --password "postmarket"

      - name: Export and Collect
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap export
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-samsung-j7-xfce
          path: output/
