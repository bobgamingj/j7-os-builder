name: Build postmarketOS Samsung J7 XFCE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip python3-venv build-essential \
            ca-certificates zip unzip rsync sudo qemu-user-static binfmt-support \
            python3-tomli openssl kpartx

      - name: Create Clean Swap Space (10GB)
        run: |
          sudo swapoff -a || true
          SWAPFILE=/mnt/pmos_build_swap
          sudo rm -f "$SWAPFILE"
          sudo fallocate -l 10G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=10240
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

      - name: Clone pmbootstrap
        run: git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports (Main Branch)
        run: |
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 --branch main https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Install pmbootstrap
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap (Safe Flag Mode)
        run: |
          source ~/venv/bin/activate
          rm -rf ~/.config/pmbootstrap.cfg
          
          # CRITICAL FIX: Using explicit flags to bypass interactive prompts entirely.
          # This avoids the "EOF when reading a line" and "Invalid channel" errors.
          pmbootstrap -y \
            -w "$PMOS_WORKDIR" \
            -p "$PMOS_APORTS" \
            init \
            --channel=edge \
            --vendor=samsung \
            --device=j7elte \
            --ui=xfce4 \
            --user="$PMOS_USER" \
            --hostname="$PMOS_HOSTNAME" \
            --no-build-pkgs-on-install

      - name: Build Android Recovery Zip
        run: |
          source ~/venv/bin/activate
          # Adding zram-init (essential for 1.5GB RAM) and nodejs for n8n
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install \
            --add "zram-init,nodejs,npm,networkmanager,sudo" \
            --android-recovery-zip \
            --password "$PMOS_PASSWORD"

      - name: Export and Collect Artifacts
        run: |
          mkdir -p output
          source ~/venv/bin/activate
          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" export
          # Locate the .zip in the temporary export directory
          find /tmp/postmarketOS-export -type f -name "*.zip" -exec cp -v {} output/ \;
          ls -lah output

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7-Final
          path: output/
          if-no-files-found: error
