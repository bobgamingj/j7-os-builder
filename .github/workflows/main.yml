name: Build postmarketOS J7 v3-Fixed
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Automated Configuration
        run: |
          # 1. Answer the first question (Workdir) and then spam 'Enter' for everything else
          printf "/home/runner/workdir\n" | yes '' | pmbootstrap init
          
          # 2. Manually inject the correct J7 settings (This bypasses all questions)
          pmbootstrap config device samsung-j7elte
          pmbootstrap config ui xfce4
          pmbootstrap config channel edge
          pmbootstrap config mirror_alpine http://dl-cdn.alpinelinux.org/alpine/
          
          # 3. Download the device files for the J7
          pmbootstrap pull

      - name: Build Android Recovery Zip
        run: |
          # This builds the OS for TWRP
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          cp -L /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
