name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support

      - name: Create swap memory
        run: |
          set -euxo pipefail

          SWAPFILE=/mnt/pmos-swapfile

          sudo swapoff -a || true
          sudo rm -f "$SWAPFILE"

          sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          free -h
          swapon --show

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports
        run: |
          set -euxo pipefail
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git "$PMOS_APORTS"

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pexpect tomli
          python -m pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          rm -rf "$PMOS_WORKDIR"
          mkdir -p "$PMOS_WORKDIR"

          python3 - <<'PY'
          import os
          import sys
          import pexpect

          workdir = os.environ["PMOS_WORKDIR"]
          aports = os.environ["PMOS_APORTS"]

          child = pexpect.spawn(
              f"pmbootstrap -y -t 3600 -w {workdir} -p {aports} init --shallow-initial-clone",
              encoding="utf-8",
              timeout=1800
          )
          child.logfile = sys.stdout
          child.delaybeforesend = 0.05

          while True:
              i = child.expect([
                  r"Work path",
                  r"pmaports path",
                  r"Choose a channel",
                  r"Vendor",
                  r"Device codename",
                  r"Kernel",
                  r"User interface",
                  r"Username",
                  r"Password",
                  r"Timezone",
                  r"Device hostname",
                  r"Enable.*SSH",
                  r"Change mirror",
                  r"Additional packages",
                  r"\[y/N\]",
                  r"\[Y/n\]",
                  pexpect.EOF,
                  pexpect.TIMEOUT
              ])

              if i in [0, 1]:
                  child.sendline("")
              elif i == 2:
                  child.sendline("edge")
              elif i == 3:
                  child.sendline("samsung")
              elif i == 4:
                  child.sendline("j7elte")
              elif i == 5:
                  child.sendline("downstream")
              elif i == 6:
                  child.sendline("xfce4")
              elif i == 7:
                  child.sendline("postmarket")
              elif i == 8:
                  child.sendline("postmarket")
              elif i == 9:
                  child.sendline("UTC")
              elif i == 10:
                  child.sendline("pmos-j7")
              elif i == 11:
                  child.sendline("none")
              elif i == 12:
                  child.sendline("n")
              elif i == 13:
                  child.sendline("")
              elif i == 14:
                  child.sendline("y")
              elif i == 15:
                  child.sendline("y")
              elif i == 16:
                  break
              else:
                  print("ERROR: pmbootstrap init timed out")
                  sys.exit(1)

          child.close()
          if child.exitstatus not in [0, None]:
              sys.exit(child.exitstatus)
          PY

      - name: Pull packages
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" pull

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install \
            --android-recovery-zip \
            --no-fde \
            --no-sshd \
            --no-firewall \
            --password "$PMOS_PASSWORD"

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          mkdir -p output

          find "$PMOS_WORKDIR" -type f \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/
          if-no-files-found: error
