name: Build postmarketOS J7 v4
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Virtual Memory
        run: |
          # J7 kernel needs extra memory to compile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Forced Initialization
        run: |
          rm -rf ~/.config/pmbootstrap.cfg
          # We use 'yes' to hit Enter for every question
          printf "/home/runner/workdir\nedge\n" | yes '' | pmbootstrap init
          
          # Inject your specific J7 hardware settings
          pmbootstrap config device samsung-j7elte
          pmbootstrap config ui xfce4
          pmbootstrap pull

      - name: Build Android Recovery Zip
        run: |
          pmbootstrap zap -m
          # PMB_EXPECT_NO_PROMPTS=1 replaces --assume-yes in new versions
          export PMB_EXPECT_NO_PROMPTS=1
          pmbootstrap install --android-recovery-zip --no-fde

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          cp -L /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
