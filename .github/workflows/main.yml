name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMB_EXPECT_NO_PROMPTS: "1"

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            zip \
            unzip \
            rsync \
            sudo

      - name: Create swap memory
        run: |
          set -euxo pipefail
          sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          swapon --show
          free -h

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install tomli
          pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          rm -rf ~/.config/pmbootstrap.cfg
          mkdir -p ~/pmos
          yes '' | pmbootstrap -w "$HOME/pmos" init -y

      - name: Set device configuration
        run: |
          set -euxo pipefail
          pmbootstrap -w "$HOME/pmos" config device samsung-j7elte
          pmbootstrap -w "$HOME/pmos" config kernel downstream
          pmbootstrap -w "$HOME/pmos" config ui xfce4
          pmbootstrap -w "$HOME/pmos" config hostname pmos-j7
          pmbootstrap -w "$HOME/pmos" config user postmarket
          pmbootstrap -w "$HOME/pmos" config locale en_US.UTF-8
          pmbootstrap -w "$HOME/pmos" config timezone UTC
          pmbootstrap -w "$HOME/pmos" config keymap us
          pmbootstrap -w "$HOME/pmos" status

      - name: Pull packages
        run: |
          set -euxo pipefail
          pmbootstrap -w "$HOME/pmos" pull

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          pmbootstrap -w "$HOME/pmos" install \
            --android-recovery-zip \
            --no-fde \
            --password postmarket

      - name: Export image
        run: |
          set -euxo pipefail
          mkdir -p output
          pmbootstrap -w "$HOME/pmos" export
          cp -rv /tmp/postmarketOS-export/* output/ || true
          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/*
          if-no-files-found: error
