name: Build postmarketOS Samsung J7 Phosh ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PMOS_BASE: /tmp/pmos-ci
      PMOS_WORK: /tmp/pmos-ci/work
      PMOS_PMAPORTS: /tmp/pmos-ci/pmaports
      PMOS_CFG: /tmp/pmos-ci/pmbootstrap_v3.cfg
      VENV_PATH: /tmp/pmos-venv
      PMBOOTSTRAP_NO_COLOR: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            qemu-user-static \
            binfmt-support \
            sudo \
            zip \
            unzip \
            rsync \
            kpartx \
            e2fsprogs \
            android-sdk-libsparse-utils \
            dosfstools \
            fakeroot \
            ccache \
            parted \
            util-linux \
            curl \
            wget

      - name: Create Python venv
        shell: bash
        run: |
          set -euxo pipefail

          python3 -m venv "$VENV_PATH"

          source "$VENV_PATH/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel \
            tomli

      - name: Install pmbootstrap
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          pmbootstrap --version

      - name: Prepare directories
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$PMOS_BASE"
          mkdir -p "$PMOS_WORK"

      - name: Clone pmaports
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf "$PMOS_PMAPORTS"

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_PMAPORTS"

          test -f "$PMOS_PMAPORTS/pmaports.cfg"

      - name: Verify pmaports
        shell: bash
        run: |
          set -euxo pipefail

          ls -lah "$PMOS_PMAPORTS"

          test -f "$PMOS_PMAPORTS/pmaports.cfg"

      - name: Initialize pmbootstrap
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          rm -f "$PMOS_CFG"

          cat <<EOF | pmbootstrap \
            -y \
            --details-to-stdout \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            init

          /tmp/pmos-ci/work
          /tmp/pmos-ci/pmaports
          edge
          samsung
          j7elte
          downstream
          user
          default
          default
          default
          phosh
          n
          default
          0
          512
          4
          5G
          y
          1
          none
          y
          en_US
          j7mini
          y
          EOF

          echo "===== GENERATED CONFIG ====="

          cat "$PMOS_CFG"

      - name: Force ARMv7 architecture
        shell: bash
        run: |
          set -euxo pipefail

          sed -i 's/^arch=.*/arch=armv7/' "$PMOS_CFG" || true

          echo "===== FINAL CONFIG ====="

          cat "$PMOS_CFG"

      - name: Build postmarketOS ZIP
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          pmbootstrap \
            -y \
            --details-to-stdout \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            install \
            --android-recovery-zip \
            --password 123456

      - name: Export files
        shell: bash
        run: |
          set -euxo pipefail

          source "$VENV_PATH/bin/activate"

          pmbootstrap \
            -c "$PMOS_CFG" \
            -w "$PMOS_WORK" \
            -p "$PMOS_PMAPORTS" \
            export

          ls -lah /tmp/postmarketOS-export/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-samsung-j7elte-phosh-armv7
          path: /tmp/postmarketOS-export/
