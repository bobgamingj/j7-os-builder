name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/.local/var/pmbootstrap/cache_git/pmaports
      PMOS_CONFIG: /home/runner/.config/pmbootstrap_v3.cfg

    steps:
      #
      # Checkout repository
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Install dependencies
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            sudo \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl

      #
      # Create swap
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo fallocate -l 8G /mnt/pmos.swap

          sudo chmod 600 /mnt/pmos.swap

          sudo mkswap /mnt/pmos.swap

          sudo swapon /mnt/pmos.swap

          free -h

      #
      # Setup Python
      #
      - name: Setup Python
        run: |
          set -euxo pipefail

          python3 -m venv /home/runner/venv

          source /home/runner/venv/bin/activate

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          #
          # FIX TOMLI ERROR
          #
          python -m pip install \
            tomli \
            typing_extensions

          python -c "import tomli"

          #
          # INSTALL PMBOOTSTRAP
          #
          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          pmbootstrap --version

      #
      # Prepare directories
      #
      - name: Prepare directories
        run: |
          set -euxo pipefail

          mkdir -p "$PMOS_WORKDIR/cache_git"

          mkdir -p ~/.config

      #
      # Clone pmaports
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # Create pmbootstrap config
      #
      - name: Create pmbootstrap config
        run: |
          set -euxo pipefail

          cat > "$PMOS_CONFIG" <<EOF
          [pmbootstrap]
          work=$PMOS_WORKDIR
          aports=$PMOS_APORTS
          channel=edge
          device=samsung-j7elte
          ui=xfce4
          user=pmos
          password=123456
          hostname=j7mini
          timezone=UTC
          locale=en_US.UTF-8
          systemd=always
          EOF

          cat "$PMOS_CONFIG"

      #
      # Verify device exists
      #
      - name: Verify device
        run: |
          set -euxo pipefail

          find "$PMOS_APORTS/device" \
            -maxdepth 2 \
            -type d \
            | grep samsung-j7 || true

      #
      # Build recovery ZIP
      #
      - name: Build recovery ZIP
        run: |
          set -euxo pipefail

          source /home/runner/venv/bin/activate

          pmbootstrap \
            --details-to-stdout \
            -c "$PMOS_CONFIG" \
            install \
            --android-recovery-zip \
            --password 123456

      #
      # Export artifacts
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      #
      # Upload artifacts
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
