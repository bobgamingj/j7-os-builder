name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/.local/var/pmbootstrap
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support

      - name: Create swap memory
        run: |
          set -euxo pipefail

          SWAPFILE=/mnt/pmos-swapfile

          sudo swapoff -a || true
          sudo rm -f "$SWAPFILE"

          sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          free -h
          swapon --show

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Clone pmaports
        run: |
          set -euxo pipefail
          rm -rf "$PMOS_APORTS"
          git clone --depth=1 --branch edge \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install tomli
          python -m pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          rm -rf "$PMOS_WORKDIR"
          mkdir -p "$PMOS_WORKDIR"

          {
            printf '\n\n'
            printf 'edge\n'
            printf 'downstream\n'
            printf 'samsung\n'
            printf 'j7elte\n'
            printf 'downstream\n'
            printf 'xfce4\n'
            printf 'postmarket\n'
            printf 'postmarket\n'
            printf 'UTC\n'
            printf 'pmos-j7\n'
            printf 'n\n'
            printf 'n\n'
            printf 'n\n'
          } | pmbootstrap -y -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" init --shallow-initial-clone

      - name: Pull packages
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" pull

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install \
            --android-recovery-zip \
            --no-sshd \
            --no-firewall \
            --password "$PMOS_PASSWORD"

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          mkdir -p output

          pmbootstrap -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" export || true

          find /tmp/postmarketOS-export "$PMOS_WORKDIR" -type f \
            \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/
          if-no-files-found: error
