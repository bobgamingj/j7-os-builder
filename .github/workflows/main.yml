name: Build postmarketOS J7
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openssl git
          pip3 install pmbootstrap

      - name: Initialize pmbootstrap
        run: |
          # This command forces the download of the device files
          pmbootstrap init --device samsung-j7elte --ui xfce4 --work /home/runner/workdir --mirror-alpine http://dl-cdn.alpinelinux.org/alpine/ --mirror-pmOS http://mirror.postmarketos.org/postmarketos/ --jobs 4 --owner runner --confirm-checksum

      - name: Build Recovery Zip
        run: |
          # We use --no-fde to save RAM/Time since you want a server
          pmbootstrap install --android-recovery-zip --no-fde

      - name: Export Zip
        run: pmbootstrap export

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7-Final
          path: /tmp/postmarketOS-export/*.zip
