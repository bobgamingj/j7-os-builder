name: Build postmarketOS J7 Native
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip openssl git python3-tomli

      - name: Clone pmbootstrap Source
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          # Create a shortcut so we can just type 'pmbootstrap'
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize and Pull Ports
        run: |
          # This sets up the environment and downloads the J7 device files
          yes '' | pmbootstrap init --device samsung-j7elte --ui xfce4 --work /home/runner/workdir --channel edge
          pmbootstrap pull

      - name: Build Android Recovery Zip
        run: |
          # This builds the Linux OS and turns it into a .zip for TWRP
          pmbootstrap install --android-recovery-zip --no-fde --assume-yes

      - name: Export and Upload
        run: |
          pmbootstrap export
          mkdir -p output
          cp /tmp/postmarketOS-export/*.zip output/

      - name: Upload Finished OS
        uses: actions/upload-artifact@v4
        with:
          name: J7-postmarketOS-XFCE
          path: output/*.zip
