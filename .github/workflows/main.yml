name: Build postmarketOS Samsung J7 Mini-PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive

      # STATIC SAFE PATHS
      PMOS_ROOT: /tmp/pmos-ci
      PMOS_WORKDIR: /tmp/pmos-ci/work
      PMOS_APORTS: /tmp/pmos-ci/pmaports
      PMOS_CONFIG: /tmp/pmos-ci/pmbootstrap_v3.cfg
      VENV_DIR: /tmp/pmos-ci/venv

    steps:
      #
      # Checkout
      #
      - name: Checkout repository
        uses: actions/checkout@v4

      #
      # Fix Ubuntu mirrors
      #
      - name: Fix apt mirrors
        run: |
          set -euxo pipefail

          sudo sed -i \
            's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list || true

          sudo apt-get clean

          echo 'Acquire::Retries "5";' \
            | sudo tee /etc/apt/apt.conf.d/80-retries >/dev/null

          echo 'Acquire::ForceIPv4 "true";' \
            | sudo tee /etc/apt/apt.conf.d/99-force-ipv4 >/dev/null

      #
      # Install packages
      #
      - name: Install dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update -o Acquire::ForceIPv4=true

          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-tomli \
            build-essential \
            ca-certificates \
            curl \
            rsync \
            unzip \
            zip \
            xz-utils \
            qemu-user-static \
            binfmt-support \
            kpartx \
            e2fsprogs \
            dosfstools \
            ccache \
            openssl \
            sudo

      #
      # Create swap
      #
      - name: Create swap
        run: |
          set -euxo pipefail

          sudo swapoff -a || true
          sudo rm -f /mnt/pmos.swap || true

          sudo fallocate -l 8G /mnt/pmos.swap || \
          sudo dd if=/dev/zero of=/mnt/pmos.swap bs=1M count=8192

          sudo chmod 600 /mnt/pmos.swap
          sudo mkswap /mnt/pmos.swap
          sudo swapon /mnt/pmos.swap

          free -h

      #
      # HARD RESET PMBOOTSTRAP STATE
      #
      - name: Remove ALL old pmbootstrap state
        run: |
          set -euxo pipefail

          sudo rm -rf \
            /home/runner/.local/var/pmbootstrap \
            /home/runner/.config/pmbootstrap_v3.cfg \
            /tmp/pmos-ci \
            ~/.cache/pmbootstrap \
            ~/.local/state/pmbootstrap \
            ~/.config/pmbootstrap

          sudo mkdir -p \
            "$PMOS_ROOT" \
            "$PMOS_WORKDIR" \
            "$PMOS_APORTS"

          sudo chown -R runner:runner "$PMOS_ROOT"

      #
      # Setup Python
      #
      - name: Setup Python environment
        run: |
          set -euxo pipefail

          python3 -m venv "$VENV_DIR"

          source "$VENV_DIR/bin/activate"

          python -m pip install --upgrade \
            pip \
            setuptools \
            wheel

          python -m pip install \
            tomli \
            typing_extensions

          python -c "import tomli"

      #
      # Install pmbootstrap
      #
      - name: Install pmbootstrap
        run: |
          set -euxo pipefail

          source "$VENV_DIR/bin/activate"

          python -m pip install \
            --no-build-isolation \
            git+https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

          pmbootstrap --version

      #
      # Clone pmaports
      #
      - name: Clone pmaports
        run: |
          set -euxo pipefail

          git clone \
            --depth=1 \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$PMOS_APORTS"

      #
      # Create config
      #
      - name: Create pmbootstrap config
        run: |
          set -euxo pipefail

          cat > "$PMOS_CONFIG" <<EOF
          [pmbootstrap]
          work=/tmp/pmos-ci/work
          aports=/tmp/pmos-ci/pmaports
          channel=edge
          device=samsung-j7elte
          kernel=downstream
          user=pmos
          ui=xfce4
          hostname=j7mini
          timezone=UTC
          locale=en_US.UTF-8
          systemd=always
          EOF

          echo "===== CONFIG ====="
          cat "$PMOS_CONFIG"

      #
      # FORCE CLEAN WORKDIR
      #
      - name: Ensure clean workdir
        run: |
          set -euxo pipefail

          sudo rm -rf /tmp/pmos-ci/work

          mkdir -p /tmp/pmos-ci/work

          ls -lah /tmp/pmos-ci

      #
      # BUILD
      #
      - name: Build recovery ZIP
        run: |
          set -euxo pipefail

          source "$VENV_DIR/bin/activate"

          export PMBOOTSTRAP_NO_COLOR=1

          pmbootstrap \
            -y \
            --details-to-stdout \
            --config="$PMOS_CONFIG" \
            --aports="$PMOS_APORTS" \
            --work="$PMOS_WORKDIR" \
            install \
            --android-recovery-zip \
            --password 123456

      #
      # Collect outputs
      #
      - name: Export artifacts
        run: |
          set -euxo pipefail

          mkdir -p output

          find "$PMOS_WORKDIR" \
            -type f \
            \( \
              -name "*.zip" -o \
              -name "*.img" -o \
              -name "*.tar.gz" \
            \) \
            -exec cp -v {} output/ \; || true

          echo "===== OUTPUT FILES ====="

          ls -lah output || true

      #
      # Upload
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-j7-mini-pc
          path: output/
