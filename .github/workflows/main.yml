name: Build postmarketOS Samsung J7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      PMOS_WORKDIR: /home/runner/pmos-work
      PMOS_APORTS: /home/runner/pmaports
      PMOS_USER: postmarket
      PMOS_PASSWORD: postmarket
      PMOS_HOSTNAME: pmos-j7

    steps:
      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            zip \
            unzip \
            rsync \
            sudo \
            qemu-user-static \
            binfmt-support

      - name: Create swap memory
        run: |
          set -euxo pipefail

          SWAPFILE=/mnt/pmos-swapfile

          sudo swapoff -a || true
          sudo rm -f "$SWAPFILE"

          sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"

          free -h
          swapon --show

      - name: Clone pmbootstrap
        run: |
          set -euxo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Install pmbootstrap
        run: |
          set -euxo pipefail
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install tomli
          python -m pip install ./pmbootstrap
          echo "$HOME/venv/bin" >> "$GITHUB_PATH"

      - name: Initialize pmbootstrap
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate

          rm -rf "$PMOS_WORKDIR"
          rm -rf "$PMOS_APORTS"
          mkdir -p "$PMOS_APORTS"

          python3 - <<'PY'
          import os
          import subprocess
          import sys

          workdir = os.environ["PMOS_WORKDIR"]
          aports = os.environ["PMOS_APORTS"]

          # Answers for the remaining interactive prompts.
          # Work path and pmaports path are passed via CLI, so they are not needed here.
          answers = "\n".join([
              "edge",
              "samsung",
              "j7elte",
              "downstream",
              "xfce4",
              os.environ["PMOS_USER"],
              os.environ["PMOS_PASSWORD"],
              "UTC",
              os.environ["PMOS_HOSTNAME"],
              "",
              "",
              "",
          ]) + "\n"

          cmd = [
              "pmbootstrap",
              "-y",
              "-t",
              "3600",
              "-w",
              workdir,
              "-p",
              aports,
              "-E",
              "0",
              "-B",
              "128",
              "init",
              "--shallow-initial-clone",
          ]

          proc = subprocess.run(cmd, input=answers, text=True)
          sys.exit(proc.returncode)
          PY

      - name: Pull packages
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" pull

      - name: Build Android recovery zip
        run: |
          set -euxo pipefail
          source ~/venv/bin/activate
          pmbootstrap -t 3600 -w "$PMOS_WORKDIR" -p "$PMOS_APORTS" install \
            --android-recovery-zip \
            --no-fde \
            --no-sshd \
            --no-firewall \
            --password "$PMOS_PASSWORD"

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          mkdir -p output

          find "$PMOS_WORKDIR" -type f \( -name "*.zip" -o -name "*.img" -o -name "*.tar.gz" \) \
            -exec cp -v {} output/ \; || true

          ls -lah output

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-J7
          path: output/
          if-no-files-found: error
